name: YouTube Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک ویدیو یوتیوب'
        required: true
      quality:
        description: 'کیفیت (مثال: best, 720, 480, worst)'
        required: false
        default: 'best'

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: نصب Deno (برای اجرای جاوااسکریپت یوتیوب)
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: نصب yt-dlp و ffmpeg
        run: |
          sudo apt update
          sudo apt install -y ffmpeg
          pip install yt-dlp

      - name: دانلود ویدیو
        run: |
          mkdir -p videos
          yt-dlp -f "${{ github.event.inputs.quality }}" \
                 --js-runtimes deno \
                 --output "videos/%(title)s.%(ext)s" \
                 "${{ github.event.inputs.url }}"

      - name: آپلود خودکار به گیت‌هاب
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add videos/
          git commit -m "دانلود ویدیو: ${{ github.event.inputs.url }}" || echo "هیچ تغییری"
          git push
